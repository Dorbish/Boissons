<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Boissons</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 15px;
            padding-bottom: 40px;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: #e94560;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 20px;
            font-size: 0.8rem;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #16213e;
            border-radius: 10px;
            padding: 10px 18px;
            text-align: center;
            border: 1px solid #0f3460;
            flex: 1;
        }

        .stat-box .number { font-size: 1.5rem; font-weight: bold; }
        .stat-box .label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; }
        .stat-box.rupture .number { color: #e94560; }
        .stat-box.dispo .number { color: #4ecca3; }
        .stat-box.total .number { color: #f5a623; }

        .tabs-container {
            display: flex;
            background: #0f3460;
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 20px;
            gap: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 10px;
            border-radius: 9px;
            border: none;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.25s;
            text-align: center;
            line-height: 1.3;
        }

        .tab-btn.active {
            background: #e94560;
            color: #fff;
            box-shadow: 0 2px 10px rgba(233,69,96,0.4);
        }

        .tab-btn.stock-tab.active {
            background: #4ecca3;
            color: #1a1a2e;
            box-shadow: 0 2px 10px rgba(78,204,163,0.4);
        }

        .tab-btn .tab-icon { font-size: 1.2rem; display: block; margin-bottom: 2px; }

        .panel { display: none; }
        .panel.active { display: block; }

        .search-bar {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #0f3460;
            background: #16213e;
            color: #eee;
            font-size: 0.9rem;
            margin-bottom: 15px;
            outline: none;
        }

        .filter-btns {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .filter-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background: #16213e;
            color: #aaa;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .filter-btn.active-filter { background: #0f3460; color: #fff; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #0f3460;
            padding: 10px 8px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            text-align: left;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid #16213e;
            font-size: 0.85rem;
            vertical-align: middle;
        }

        tr:hover td { background: #16213e55; }

        .category-row td {
            background: #0f3460;
            color: #4ecca3;
            font-weight: bold;
            font-size: 0.8rem;
            letter-spacing: 1px;
            padding: 8px 10px;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            white-space: nowrap;
        }

        .badge.rupture { background: #e9456022; color: #e94560; border: 1px solid #e94560; }
        .badge.dispo   { background: #4ecca322; color: #4ecca3; border: 1px solid #4ecca3; }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .qty-btn {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            border: none;
            background: #0f3460;
            color: #eee;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .qty-btn:active { background: #e94560; }

        .qty-input {
            width: 45px;
            text-align: center;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 7px;
            color: #eee;
            font-size: 0.95rem;
            padding: 5px 2px;
            -moz-appearance: textfield;
        }

        .qty-input::-webkit-inner-spin-button,
        .qty-input::-webkit-outer-spin-button { -webkit-appearance: none; }

        .name-col { min-width: 130px; }

        .reset-btn {
            display: block;
            margin: 25px auto 0;
            padding: 10px 30px;
            background: #e9456033;
            color: #e94560;
            border: 1px solid #e94560;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .reset-btn:active { background: #e94560; color: #fff; }
    </style>
</head>
<body>

<h1>🥤 Gestion des Boissons</h1>
<p class="subtitle">Mise à jour en temps réel</p>

<div class="stats-bar">
    <div class="stat-box total">
        <div class="number" id="stat-total">0</div>
        <div class="label">Produits</div>
    </div>
    <div class="stat-box rupture">
        <div class="number" id="stat-rupture">0</div>
        <div class="label">Ruptures</div>
    </div>
    <div class="stat-box dispo">
        <div class="number" id="stat-dispo">0</div>
        <div class="label">Disponibles</div>
    </div>
</div>

<div class="tabs-container">
    <button class="tab-btn active" id="tab-vitrine" onclick="switchTab('vitrine')" data-filter="all">
        <span class="tab-icon">🪟</span>Vitrine<br><small style="font-weight:normal;color:inherit">Équipiers</small>
    </button>
    <button class="tab-btn stock-tab" id="tab-stock" onclick="switchTab('stock')" data-filter="all">
        <span class="tab-icon">📦</span>Stock<br><small style="font-weight:normal;color:inherit">Responsable</small>
    </button>
</div>

<!-- PANEL VITRINE -->
<div class="panel active" id="panel-vitrine">
    <input class="search-bar" id="search-vitrine" type="text" placeholder="🔍 Rechercher une boisson...">
    <div class="filter-btns">
        <button class="filter-btn active-filter" onclick="setFilter('vitrine','all',this)">Tous</button>
        <button class="filter-btn" onclick="setFilter('vitrine','rupture',this)">Ruptures</button>
        <button class="filter-btn" onclick="setFilter('vitrine','dispo',this)">Disponibles</button>
    </div>
    <table>
        <thead>
            <tr>
                <th class="name-col">Produit</th>
                <th>Qté Vitrine</th>
                <th>Statut</th>
            </tr>
        </thead>
        <tbody id="tbody-vitrine"></tbody>
    </table>
</div>

<!-- PANEL STOCK -->
<div class="panel" id="panel-stock">
    <input class="search-bar" id="search-stock" type="text" placeholder="🔍 Rechercher une boisson...">
    <div class="filter-btns">
        <button class="filter-btn active-filter" onclick="setFilter('stock','all',this)">Tous</button>
        <button class="filter-btn" onclick="setFilter('stock','rupture',this)">Ruptures</button>
        <button class="filter-btn" onclick="setFilter('stock','dispo',this)">Disponibles</button>
    </div>
    <table>
        <thead>
            <tr>
                <th class="name-col">Produit</th>
                <th>Qté Stock</th>
                <th>Statut</th>
            </tr>
        </thead>
        <tbody id="tbody-stock"></tbody>
    </table>
    <button class="reset-btn" onclick="resetAll()">🔄 Remettre tout à zéro</button>
</div>

<script>
    // ─── DONNÉES ──────────────────────────────────────────────────────────────

    const ordreVitrine = [
        "Volvic Citron", "Volvic Fraise", "Volvic Pamplemousse", "Volvic Fruit Exotique",
        "Caprisun", "Minute Maid",
        "Lorina Pêche", "Lorina Grenade", "Lorina",
        "Coca", "Coca Zéro", "Coca Cherry",
        "Orangina",
        "Fuze Tea", "Fuze Tea Framboise",
        "Oasis", "Pulco", "Schweppes", "Sprite", "Fanta",
        "Coca can", "Coca Zéro can", "Orangina can",
        "Schweppes can", "Schweppes Zéro can", "Sprite can", "Fuze Tea can", "Oasis can",
        "Minute Maid Multi can", "Minute Maid Pomme can", "Minute Maid Orange can",
        "San Pellegrino Orange can", "San Pellegrino Citron can",
        "Soofy Mojito can", "Soofy Litchi can",
        "Perrier citron can",
        "Christaline 1.5L", "Vittel", "Christaline 0.5L",
        "Christaline Pétillante", "Perrier", "San Pellegrino", "Badoit Citron"
    ];

    const categoriesStock = [
        {
            name: "Eaux Plates",
            products: [
                "Christaline 1.5L", "Christaline 0.5L", "Vittel",
                "Volvic Citron", "Volvic Fraise", "Volvic Pamplemousse", "Volvic Fruit Exotique"
            ]
        },
        {
            name: "Eaux Pétillantes",
            products: [
                "Christaline Pétillante", "Perrier", "San Pellegrino", "Badoit Citron"
            ]
        },
        {
            name: "Sodas Bouteilles",
            products: [
                "Coca", "Coca Zéro", "Coca Cherry",
                "Orangina",
                "Fuze Tea", "Fuze Tea Framboise",
                "Oasis", "Pulco", "Schweppes", "Sprite", "Fanta",
                "Lorina", "Lorina Pêche", "Lorina Grenade"
            ]
        },
        {
            name: "Sodas Canettes",
            products: [
                "Coca can", "Coca Zéro can", "Orangina can",
                "Schweppes can", "Schweppes Zéro can", "Sprite can",
                "Fuze Tea can", "Oasis can",
                "Soofy Mojito can", "Soofy Litchi can",
                "Perrier citron can",
                "San Pellegrino Orange can", "San Pellegrino Citron can"
            ]
        },
        {
            name: "Jus & Nectars",
            products: [
                "Minute Maid", "Caprisun",
                "Minute Maid Multi can", "Minute Maid Pomme can", "Minute Maid Orange can"
            ]
        }
    ];

    // ─── STATE ────────────────────────────────────────────────────────────────

    let products = {};
    let vitrineInputsList = [];
    let stockInputsList   = [];

    function loadData() {
        const saved = localStorage.getItem("boissons_v5");
        if (saved) {
            products = JSON.parse(saved);
        }
        ordreVitrine.forEach(name => {
            if (!products[name]) {
                products[name] = { vitrine: 0, stock: 0, rupture: true };
            }
        });
        saveData();
    }

    function saveData() {
        localStorage.setItem("boissons_v5", JSON.stringify(products));
    }

    function updateStats() {
        const all = Object.values(products);
        const ruptures = all.filter(p => p.rupture).length;
        document.getElementById("stat-total").textContent   = all.length;
        document.getElementById("stat-rupture").textContent = ruptures;
        document.getElementById("stat-dispo").textContent   = all.length - ruptures;
    }

    function refreshBadges(name) {
        const p = products[name];
        document.querySelectorAll(`.badge[data-name="${name}"]`).forEach(b => {
            b.className = "badge " + (p.rupture ? "rupture" : "dispo");
            b.textContent = p.rupture ? "Rupture" : "Disponible";
        });
        saveData();
    }

    // ─── TABS ─────────────────────────────────────────────────────────────────

    function switchTab(tab) {
        document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById("panel-" + tab).classList.add("active");
        document.getElementById("tab-" + tab).classList.add("active");
    }

    // ─── FILTRES ──────────────────────────────────────────────────────────────

    function setFilter(tab, filter, btn) {
        document.getElementById("tab-" + tab).dataset.filter = filter;
        btn.closest(".filter-btns").querySelectorAll(".filter-btn")
            .forEach(b => b.classList.remove("active-filter"));
        btn.classList.add("active-filter");
        applyFilter(tab);
    }

    function applyFilter(tab) {
        const filter  = document.getElementById("tab-" + tab).dataset.filter || "all";
        const search  = document.getElementById("search-" + tab).value.toLowerCase();
        const tbody   = document.getElementById("tbody-" + tab);
        const field   = tab === "vitrine" ? "vitrine" : "stock";

        tbody.querySelectorAll("tr:not(.category-row)").forEach(tr => {
            const name = tr.dataset.name;
            if (!name) return;
            const p = products[name];
            const matchSearch = name.toLowerCase().includes(search);
            const matchFilter = filter === "all"
                || (filter === "rupture" && p.rupture)
                || (filter === "dispo" && !p.rupture);
            tr.style.display = (matchSearch && matchFilter) ? "" : "none";
        });

        if (tab === "stock") {
            tbody.querySelectorAll("tr.category-row").forEach(catRow => {
                let next = catRow.nextElementSibling;
                let hasVisible = false;
                while (next && !next.classList.contains("category-row")) {
                    if (next.style.display !== "none") hasVisible = true;
                    next = next.nextElementSibling;
                }
                catRow.style.display = hasVisible ? "" : "none";
            });
        }
    }

    // ─── RESET ────────────────────────────────────────────────────────────────

    function resetAll() {
        if (!confirm("Remettre toutes les quantités à zéro ?")) return;
        Object.keys(products).forEach(name => {
            products[name].vitrine = 0;
            products[name].stock   = 0;
            products[name].rupture = true;
        });
        saveData();
        renderBothTables();
    }

    // ─── RENDU ────────────────────────────────────────────────────────────────

    function makeRow(name, tab) {
        const p     = products[name];
        const field = tab === "vitrine" ? "vitrine" : "stock";
        const tr    = document.createElement("tr");
        tr.dataset.name = name;

        const tdName = document.createElement("td");
        tdName.className = "name-col";
        tdName.textContent = name;

        const tdQty = document.createElement("td");
        const ctrl  = document.createElement("div");
        ctrl.className = "qty-control";

        const btnMinus = document.createElement("button");
        btnMinus.className = "qty-btn";
        btnMinus.textContent = "−";

        const input = document.createElement("input");
        input.type      = "number";
        input.className = "qty-input";
        input.value     = p[field];
        input.min       = "0";

        if (tab === "vitrine") vitrineInputsList.push(input);
        else                   stockInputsList.push(input);

        const btnPlus = document.createElement("button");
        btnPlus.className = "qty-btn";
        btnPlus.textContent = "+";

        ctrl.appendChild(btnMinus);
        ctrl.appendChild(input);
        ctrl.appendChild(btnPlus);
        tdQty.appendChild(ctrl);

        const tdBadge  = document.createElement("td");
        const badge    = document.createElement("span");
        badge.className = "badge " + (p.rupture ? "rupture" : "dispo");
        badge.textContent = p.rupture ? "Rupture" : "Disponible";
        badge.dataset.name = name;
        tdBadge.appendChild(badge);

        tr.appendChild(tdName);
        tr.appendChild(tdQty);
        tr.appendChild(tdBadge);

        const list = tab === "vitrine" ? vitrineInputsList : stockInputsList;

        btnMinus.addEventListener("click", () => {
            if (p[field] > 0) p[field]--;
            input.value = p[field];
            p.rupture = p[field] <= 0;
            refreshBadges(name);
            updateStats();
        });

        btnPlus.addEventListener("click", () => {
            p[field]++;
            input.value = p[field];
            p.rupture = p[field] <= 0;
            refreshBadges(name);
            updateStats();
        });

        input.addEventListener("change", () => {
            const v = parseInt(input.value) || 0;
            p[field]  = v < 0 ? 0 : v;
            input.value = p[field];
            p.rupture = p[field] <= 0;
            refreshBadges(name);
            updateStats();
        });

        input.addEventListener("keydown", e => {
            if (e.key === "Enter") focusNext(list, input);
        });

        input.addEventListener("focus", () => input.select());

        return tr;
    }

    function renderBothTables() {
        vitrineInputsList = [];
        stockInputsList   = [];

        const tbodyV = document.getElementById("tbody-vitrine");
        const tbodyS = document.getElementById("tbody-stock");
        tbodyV.innerHTML = "";
        tbodyS.innerHTML = "";

        ordreVitrine.forEach(name => {
            tbodyV.appendChild(makeRow(name, "vitrine"));
        });

        categoriesStock.forEach(cat => {
            const catRow = document.createElement("tr");
            catRow.classList.add("category-row");
            catRow.innerHTML = `<td colspan="3">📦 ${cat.name}</td>`;
            tbodyS.appendChild(catRow);
            cat.products.forEach(name => {
                tbodyS.appendChild(makeRow(name, "stock"));
            });
        });

        document.getElementById("tab-vitrine").dataset.filter = "all";
        document.getElementById("tab-stock").dataset.filter   = "all";
        applyFilter("vitrine");
        applyFilter("stock");
        updateStats();
    }

    function focusNext(list, current) {
        const idx = list.indexOf(current);
        for (let i = idx + 1; i < list.length; i++) {
            const next = list[i];
            if (next.closest("tr").style.display !== "none") {
                next.focus();
                next.select();
                break;
            }
        }
    }

    loadData();
    renderBothTables();

    document.getElementById("search-vitrine").addEventListener("input", () => applyFilter("vitrine"));
    document.getElementById("search-stock").addEventListener("input",   () => applyFilter("stock"));
</script>

</body>
</html>
